version: 2

# Built-in dbt tests — run via `dbt test --select tag:stocks` or `tag:weather` from the DAG BashOperator
models:
  - name: stg_company_financials
    config:
      tags: ['stocks']  # matches tag:stocks in SQL config — ensures dbt test --select tag:stocks picks up these tests
    description: "Staged SEC EDGAR financials — types cast, nulls filtered"
    columns:
      - name: ticker
        data_tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'GOOGL']  # must match TICKERS list in dag_stocks.py
      - name: metric
        data_tests: [not_null]
      - name: period_end
        data_tests: [not_null]
      - name: value
        data_tests: [not_null]

  - name: stg_weather_hourly
    config:
      tags: ['weather']  # matches tag:weather in SQL config — ensures dbt test --select tag:weather picks up these tests
    description: "Staged Open-Meteo weather — epoch seconds converted to TIMESTAMP_NTZ"
    columns:
      - name: observation_time
        data_tests: [not_null]
      - name: temperature_f
        data_tests: [not_null]

  - name: fct_company_financials
    config:
      tags: ['stocks']
    description: "Dashboard-ready annual financials — deduplicated, FY rows only"
    columns:
      - name: ticker
        data_tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'GOOGL']
      - name: metric
        data_tests: [not_null]
      - name: period_end
        data_tests: [not_null]

  - name: dim_company
    config:
      tags: ['stocks']
    description: "Company dimension table — one row per ticker for dashboard dropdowns and joins"
    columns:
      - name: ticker
        data_tests: [not_null, unique]
      - name: cik
        data_tests: [not_null]
      - name: entity_name
        data_tests: [not_null]

  - name: fct_weather_hourly
    config:
      tags: ['weather']
    description: "Dashboard-ready weather facts — deduplicated on observation_time + location"
    columns:
      - name: observation_time
        data_tests: [not_null, unique]
      - name: temperature_f
        data_tests: [not_null]
