executor: LocalExecutor

# Override base Airflow image to use official Apache image (bitnami/airflow:3.0.5 was removed from Docker Hub)
# Also override Redis image — bitnami/redis:8.2.1 doesn't exist on Docker Hub; use official Redis
images:
  airflow:
    repository: airflow-dbt    # custom image built on EC2 and imported into K3S containerd — see airflow/docker/Dockerfile
    tag: "3.1.8-dbt"           # deploy.sh overrides this via --set images.airflow.tag at deploy time (dynamic timestamp tag)
    pullPolicy: Never          # use the locally imported image — no ECR needed, avoids registry storage cost
  redis:
    repository: redis
    tag: "7.2-bookworm"

# ECR credentials: all Airflow pods pull images from ECR (private AWS registry)
imagePullSecrets:
  - name: ecr-credentials

# Install extra pip packages at pod startup so all pods get them
# pymysql: SQLAlchemy needs it to connect to MariaDB via mysql+pymysql://
# requests>=2.32.3: pins requests to a version that supports urllib3 2.x (fixes RequestsDependencyWarning)
# apache-airflow-providers-common-compat>=1.5.0: upgrades the compat shim that was importing the
#   deprecated airflow.security.permissions module (fixes RemovedInAirflow4Warning on dags list)
# NOTE: do NOT pin apache-airflow-providers-snowflake or snowflake-connector-python here —
#   apache/airflow:3.1.8 already bundles 6.10.0 / 4.0.0; pinning older ==5.6.1 / ==3.10.1
#   causes pip to downgrade them at every pod startup (~7 min download), breaking the startup probe
env:
  - name: _PIP_ADDITIONAL_REQUIREMENTS
    value: "pymysql requests>=2.32.3 apache-airflow-providers-common-compat>=1.5.0 kafka-python python-dotenv"
  - name: AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE  # prevents moment.tz.guess() on login; moment.tz() error on Home Page is a known Airflow 3.x cosmetic bug (non-blocking, unfixable via Helm)
    value: "America/New_York"
  # OpenLineage — native to Airflow 3.x (apache-airflow-providers-openlineage bundled)
  # console transport: emits events to stdout (visible per-task in Airflow logs)
  # To switch to Marquez: change to '{"type": "http", "config": {"url": "http://marquez:5000"}}'
  - name: AIRFLOW__OPENLINEAGE__TRANSPORT
    value: '{"type": "console"}'
  - name: AIRFLOW__OPENLINEAGE__NAMESPACE  # groups all jobs under one lineage namespace in Marquez/Atlan
    value: "pipeline"
  - name: AIRFLOW__OPENLINEAGE__EXECUTION_TIMEOUT  # seconds before the OL subprocess is killed; default 10s is too short for slow provider imports on t3.large
    value: "60"
  - name: AIRFLOW__CORE__MP_START_METHOD
    value: "spawn"   # Python 3.12+: use spawn instead of fork to avoid deadlocks in multi-threaded scheduler
  - name: PYTHONWARNINGS
    value: "ignore:This process:DeprecationWarning"   # suppress LocalExecutor os.fork() warning — harmless, Airflow calls os.fork() directly bypassing MP_START_METHOD
  - name: MLFLOW_TRACKING_URI  # lets Airflow tasks log experiments to the in-cluster MLflow server
    value: "http://mlflow.airflow-my-namespace.svc.cluster.local:5500"
  # AIRFLOW_VAR_ prefix: Airflow natively exposes these as Variable.get() without any kubectl exec or DB write.
  # Running `airflow variables set` via kubectl exec spawns a full Python process that imports all providers —
  # on Airflow 3.x this memory spike OOM-kills (exit 137) the scheduler container. Env vars avoid that entirely.
  - name: AIRFLOW_VAR_MLFLOW_TRACKING_URI  # Variable.get('MLFLOW_TRACKING_URI') in DAGs/anomaly_detector.py
    value: "http://mlflow.airflow-my-namespace.svc.cluster.local:5500"
  - name: AIRFLOW_VAR_KAFKA_BOOTSTRAP_SERVERS  # Variable.get('KAFKA_BOOTSTRAP_SERVERS') in consumer DAGs
    value: "kafka.kafka.svc.cluster.local:9092"

# Override postgresql image: chart default tag (16.1.0-debian-11-r15) removed from Docker Hub; ECR Public has no rate limits from EC2
postgresql:
  image:
    registry: public.ecr.aws
    repository: bitnami/postgresql
    tag: "16"

# Inject all DB credentials and API keys into every Airflow pod from the db-credentials secret
extraEnvFrom: |
  - secretRef:
      name: db-credentials
  - secretRef:
      name: snowflake-credentials  # injects SNOWFLAKE_ACCOUNT, USER, PASSWORD, DATABASE, SCHEMA, WAREHOUSE, ROLE

dags:
  gitSync:
    # WHY THIS FIX EXISTS:
    # The Airflow Helm chart has two modes for configuring liveness/readiness probes on git-sync
    # containers: the old behavior (recommendedProbeSetting: false, now deprecated) and the new
    # recommended behavior (recommendedProbeSetting: true). The chart emits a DEPRECATION WARNING
    # during `helm upgrade` whenever this flag is false (which is the default), telling you to opt
    # into the new probe configuration.
    #
    # This project does NOT use git-sync at all — DAGs are loaded via a PVC (see `persistence`
    # below). However, the chart evaluates this flag unconditionally regardless of whether
    # git-sync is enabled, so the warning fires on every deploy.
    #
    # Setting this to `true` IS the fix (not a suppression): it opts into the new probe behavior,
    # which is what Airflow recommends going forward. Since git-sync is disabled here, the probe
    # settings have no practical effect on the deployment either way — but this silences the
    # warning by using the correct, non-deprecated API.
    recommendedProbeSetting: true
  persistence:
    enabled: true
    existingClaim: dag-pvc

logs:
  persistence:
    enabled: true
    existingClaim: log-pvc  # optional; or let Helm manage

persistence:
  enabled: true
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 1Gi

airflow:
  config:
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags



# Adding things below to be able to print via my outputTextWriter outside of K3S Kubernetes pods

workers:
  # Link the folder specified in my pvc-outputtextwriter
  # (the external folder, in my ec2 instance)
  # To this folder specified here inside my K3S Kubernetes pod
  extraVolumes:
   - name: out-volume
     persistentVolumeClaim:
       claimName:  pvc-outputtextwriter
   - name: dbt-profiles           # mounts profiles.yml from K8s secret so BashOperator can find it at /dbt/profiles.yml
     secret:
       secretName: dbt-profiles   # create with: kubectl create secret generic dbt-profiles --from-file=profiles.yml=./profiles.yml -n airflow
  extraVolumeMounts:
   - name: out-volume
     mountPath: /opt/airflow/out
   - name: dbt-profiles
     mountPath: /dbt              # DBT_PROFILES_DIR=/dbt in BashOperator commands points dbt here
     readOnly: true
     
scheduler:
  # Same as in workers section
  # Link the folder specified in my pvc-outputtextwriter
  # (the external folder, in my ec2 instance)
  # To this folder specified here inside my K3S Kubernetes pod
  extraVolumes:
   - name: out-volume
     persistentVolumeClaim:
       claimName: pvc-outputtextwriter
   - name: dbt-profiles           # LocalExecutor runs tasks in the scheduler pod — must mount here too
     secret:
       secretName: dbt-profiles
  extraVolumeMounts:
   - name: out-volume
     mountPath: /opt/airflow/out
   - name: dbt-profiles
     mountPath: /dbt              # matches DBT_PROFILES_DIR=/dbt in BashOperator bash_command
     readOnly: true
  # Airflow 3.x loads full provider stack per jobs-check call; needs up to 45s on t3.large.
  # timeoutSeconds raised 45→60: probes were hitting the 45s ceiling under load, causing CrashLoopBackOff.
  # failureThreshold raised 15→30 (Apr 2026): belt-and-suspenders for CPU-starved deploys;
  # 30 chances × 60s (timeoutSeconds dominates periodSeconds) = 30 min startup window.
  startupProbe:
    failureThreshold: 30
    periodSeconds: 30
    timeoutSeconds: 60
  # Auto-restarts scheduler if it freezes without crashing (startup probe only fires once at boot)
  livenessProbe:
    initialDelaySeconds: 10   # wait 10s after startup probe passes before first check
    timeoutSeconds: 60        # raised 45→60 to match startupProbe (same provider-load reason)
    failureThreshold: 5       # 5 consecutive failures (5 min) before K8s kills and restarts the pod
    periodSeconds: 60         # check every 60s — scheduler heartbeats every 5s so this avoids false positives
  # Heart of Airflow — parses DAGs and triggers tasks. Guaranteed 512Mi prevents slow scheduling under load.
  # 3Gi limit: raised from 2Gi (Apr 2026) — OpenLineage integration (MLflow Thread 1) spawns a second subprocess
  # per task to emit lineage events; each OL subprocess loads the full provider stack (~300MB). Two concurrent DAGs
  # (weather + stocks) produce 4 subprocesses total (2 task workers + 2 OL emitters) at ~400MB each, pushing the
  # old 2Gi ceiling to ~2.2GB and OOM-killing the pod. 3Gi provides safe headroom.
  # cpu request raised 100m→200m (Apr 2026): 100m caused CPU starvation during startup — Airflow 3.x provider loading
  # (~45s normally) was hitting 60s probe timeouts on every attempt, exhausting all 15 startup probe failures (900s)
  # and triggering CrashLoopBackOff. Offset by reducing webserver/triggerer/dagProcessor requests by 25m each (net +25m).
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "3Gi"
      cpu: "1000m"

# Resource limits required on t3.large (8 GB RAM). Without limits a runaway component can OOMKill (Out Of Memory Kill — OS force-kills the pod when it exceeds its RAM allowance) other pods.
# requests = K8s scheduling guarantee; limits = hard ceiling. Amounts chosen at ~2x observed baseline
# (EC2_SIZING.md) to absorb startup spikes while keeping total ceiling ~2.75Gi — safe headroom for Kafka later.

webserverSecretKey: "c82a941d3c3dbada9432074fd29b3865933a3edd4930cc1596593172ead46fb2"  # static key prevents session invalidation on every helm upgrade/redeploy

# Airflow 3.x no longer creates airflow-webserver-secret-key (that secret was 2.x only).
# Disable the built-in env var injection so pods don't reference a secret that doesn't exist.
enableBuiltInSecretEnvVars:
  AIRFLOW__WEBSERVER__SECRET_KEY: false

webserver:
  # Airflow UI + REST API server. OOMKilled at 1Gi with azure+snowflake providers loaded across 4 workers.
  # Increased to 2Gi limit + 2 workers (AIRFLOW__WEBSERVER__WORKERS=2) to stay well under ceiling.
  # cpu request lowered 100m→75m (Apr 2026): offset for scheduler increase; Gunicorn UI is mostly idle at steady-state.
  env:
    - name: AIRFLOW__WEBSERVER__WORKERS  # reduce from 4→2 workers; each worker loads all providers (~300MB each)
      value: "2"
  resources:
    requests:
      memory: "512Mi"
      cpu: "75m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  # Provider loading across 4 gunicorn workers takes >60s on t3.large; give 3 min to start
  startupProbe:
    failureThreshold: 18
    periodSeconds: 10
    timeoutSeconds: 20

apiServer:
  # Airflow 3.x: REST API + UI server (split from webserver). Handles all API calls and serves the web UI.
  # Give 3 min to start — pymysql installs at startup before the HTTP endpoint comes up.
  env:
    - name: AIRFLOW__API_SERVER__WORKERS  # reduce from 4→2 workers; each loads all providers (~300MB each)
      value: "2"
  startupProbe:
    failureThreshold: 18  # 180s — matches webserver/scheduler
    periodSeconds: 10
    timeoutSeconds: 45  # was 20 — Airflow 3.x provider loading takes 30-45s (same fix as scheduler)
  # Auto-restarts api-server if it freezes; timeout raised for same provider-loading reason as scheduler
  livenessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 45  # Airflow 3.x provider loading takes 30-45s
    failureThreshold: 5
    periodSeconds: 60
  # 2Gi limit: same fix as webserver in 2.x — OOMKilled at 1Gi with 4 gunicorn workers × ~300MB provider load each
  resources:
    requests:
      memory: "256Mi"
      cpu: "75m"
    limits:
      memory: "2Gi"
      cpu: "500m"

triggerer:
  # Runs deferred operators (async sensors). Baseline is lightweight (~100 MB).
  # 512Mi limit: observed OOMKill at 256Mi on t3.large with providers loaded at startup.
  # Airflow 3.x loads full provider stack per jobs-check call; needs 45s. Same fix as scheduler/api-server/dagProcessor.
  # cpu request lowered 75m→50m (Apr 2026): offset for scheduler increase; triggerer is lightweight at steady-state.
  livenessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 45  # Airflow 3.x provider loading takes 30-45s
    failureThreshold: 5
    periodSeconds: 60
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "300m"

dagProcessor:
  # Continuously re-parses DAG files. 256Mi request covers normal cycles.
  # 512Mi limit: if exceeded it signals a DAG code problem (e.g. import loop), not a sizing issue.
  # dagProcessor schema doesn't support startupProbe — only livenessProbe fields.
  # Raise timeout from default 20s: Airflow 3.x loads full provider stack per jobs-check call (30-45s).
  # cpu request lowered 75m→50m (Apr 2026): offset for scheduler increase; DAG parsing is periodic, not CPU-intensive.
  livenessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 45  # Airflow 3.x provider loading takes 30-45s (same fix as scheduler/api-server)
    failureThreshold: 5
    periodSeconds: 60
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Run DB migration as a regular K8s Job instead of a Helm post-upgrade hook.
# useHelmHooks: true (chart default) makes helm upgrade block until the migrate job
# finishes — on this single-node K3S cluster that exceeds --timeout 10m, causing
# "timed out waiting for the condition". With false, Helm returns immediately;
# the job still runs and each pod's waitForMigrations init container waits for it.
migrateDatabaseJob:
  useHelmHooks: false
