apiVersion: v1
kind: PersistentVolume
metadata:
  name: dag-pv
  namespace: airflow-my-namespace
spec:
  accessModes:
    - ReadWriteOnce  # ReadOnlyMany
  capacity:
    storage: 1Gi
  hostPath:
    path: /home/ubuntu/airflow/dags  # updated path to match deploy.sh sync destination
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  claimRef:
    namespace: airflow-my-namespace
    name: dag-pvc