# Kafka Helm values — single-broker KRaft deployment on K3s
# Chart: bitnami/kafka v4+ (KRaft-native, no ZooKeeper required)
#
# Deploy:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   kubectl create namespace kafka
#   helm install kafka bitnami/kafka -f kafka/helm/kafka-values.yaml -n kafka
#
# After broker is Ready, create topics:
#   kubectl exec -it kafka-0 -n kafka -- kafka-topics.sh \
#     --bootstrap-server localhost:9092 --create \
#     --topic stocks.financials.raw --partitions 1 --replication-factor 1
#
#   kubectl exec -it kafka-0 -n kafka -- kafka-topics.sh \
#     --bootstrap-server localhost:9092 --create \
#     --topic weather.hourly.raw --partitions 1 --replication-factor 1
#
# Airflow pods reach the broker at: kafka.kafka.svc.cluster.local:9092
# Set Airflow Variable: KAFKA_BOOTSTRAP_SERVERS = kafka.kafka.svc.cluster.local:9092

kraft:
  enabled: true           # KRaft mode — no ZooKeeper (~300MB RAM savings)

replicaCount: 1           # single broker — sufficient for a single-node K3s learning cluster

# Tight resource limits to preserve headroom on t3.large (8GB total)
# Airflow components already consume ~2.75Gi; Kafka needs ~256Mi baseline
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"         # burst headroom for batch ingest messages
    cpu: "500m"

persistence:
  size: 2Gi
  storageClass: local-path  # matches K3s default storageClass used by Airflow PVCs

service:
  type: ClusterIP           # internal-only — Airflow pods on same cluster reach it directly

extraConfig: |
  auto.create.topics.enable=false   # topics must be created explicitly (prevents typo-driven topic sprawl)
  log.retention.hours=48            # keep messages 48h — producer runs daily/hourly, consumer runs right after
  log.retention.bytes=104857600     # 100MB max per topic partition — prevents disk fill on t3.large
